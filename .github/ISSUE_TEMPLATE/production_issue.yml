name: "🚨 Production Issue"
description: 프로덕션 이슈를 등록하고 관리합니다.
title: "[Production] "
labels: ["production"]
body:
  - type: markdown
    attributes:
      value: |
        ## 1️⃣ 문제 등록 (Reporter)

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      options:
        - "🔴 Critical"
        - "🟠 High"
        - "🟡 Medium"
        - "🟢 Low"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "현상 / 재현 경로"
      placeholder: |
        무슨 문제가 발생했는지, 어떻게 하면 재현되는지 적어주세요.
        예: 로그인 버튼 클릭 시 무반응, 콘솔에 500 에러 발생
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "에러 로그 / 스크린샷"

  - type: markdown
    attributes:
      value: |
        ---
        ## 2️⃣ 담당자 해결 (Developer)

  - type: textarea
    id: resolution
    attributes:
      label: "원인 & 조치 사항"

  - type: input
    id: pr-link
    attributes:
      label: "PR / 커밋 링크"

  - type: markdown
    attributes:
      value: |
        ---
        ## 3️⃣ 최종 승인 (Approver)

  - type: dropdown
    id: approval-status
    attributes:
      label: "승인 상태"
      options:
        - "검토 중"
        - "Approved"
        - "Rejected"
