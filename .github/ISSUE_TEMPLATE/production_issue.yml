name: "🚨 Production Issue (프로덕션 이슈)"
description: 프로덕션 환경의 이슈를 등록하고 프로세스에 따라 관리합니다.
title: "[PROD] "
labels: ["production"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📋 프로덕션 이슈 등록
        > 아래 항목을 작성하여 문제를 등록해 주세요. 등록된 이슈는 해결 및 승인 절차를 거치게 됩니다.

  - type: dropdown
    id: issue_type
    attributes:
      label: "🏷️ 종류 (Type)"
      description: 발생한 이슈의 종류를 선택해 주세요.
      options:
        - "Bug (버그/오류)"
        - "Outage (장애/서비스 중단)"
        - "Improvement (개선 사항)"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "🚨 우선순위 (Priority)"
      options:
        - "High (긴급)"
        - "Medium (보통)"
        - "Low (낮음)"
    validations:
      required: true

  - type: input
    id: assignee
    attributes:
      label: "👤 담당자 지정 (Assignee)"
      placeholder: "예: @username 또는 담당자 이름"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "📝 문제점 (Description)"
      description: 어떤 문제점이 발생했는지 적어주세요.
      placeholder: "예: 프로필 이미지 업로드 시 500 에러가 발생하며 업로드가 실패함"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 🔄 해결 및 승인 절차 (이슈 등록 이후 작성)

        ### 2️⃣ [담당자 해결]
        * **해결 방법**: 
        * **진행 완료**: [ ] 개발/테스트 완료 (PR/Commit Link: )

        ### 3️⃣ [최종 승인자 결과]
        * **최종 승인 여부**: [ ] 승인 (Approved) / [ ] 반려 (Rejected)
        * **승인자 및 결과 피드백**: 
