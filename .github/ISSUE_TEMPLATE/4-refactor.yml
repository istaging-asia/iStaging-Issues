name: "🛠️ Refactor"
description: 리팩토링
title: "[Refactor] "
labels: ["refactor"]
body:
  - type: textarea
    id: description
    attributes:
      label: "📝 설명"
      description: "어떤 부분을, 왜 리팩토링하는지 작성해 주세요."
      placeholder: "예: 중복된 API 호출 로직을 커스텀 훅으로 분리"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업할 내용"
      description: "할 일을 체크박스 형태로 작성해주세요."
      value: |
        - [ ] 
        - [ ]
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: "👤 참고 자료"
      description: "관련 코드 위치나 문서가 있다면 작성해 주세요."
