name: "🚀 Deploy"
description: 배포 관련 작업
title: "[Deploy] "
labels: ["deploy"]
body:
  - type: dropdown
    id: env
    attributes:
      label: "배포 환경"
      options:
        - "Production"
        - "Staging"
        - "Dev"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "📝 설명"
      description: "어떤 배포 작업인지 설명해 주세요."
      placeholder: "예: v2.3.0 버전 프로덕션 배포"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업할 내용"
      description: "배포 체크리스트를 작성해주세요."
      value: |
        - [ ] 빌드 확인
        - [ ]
    validations:
      required: true

  - type: input
    id: pr-link
    attributes:
      label: "🔗 관련 PR / 커밋"
      placeholder: "https://github.com/.../pull/123"

  - type: textarea
    id: reference
    attributes:
      label: "👤 참고 자료"
